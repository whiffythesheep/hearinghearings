<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Hearing Hearings{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
</head>
<body class="{% block body_class %}desktop{% endblock %}">
    <div class="window">
        <div class="window-titlebar">
            <span class="window-title">
                <span class="window-title-icon" aria-hidden="true">▓</span>
                {% block window_title %}Hearing Hearings{% endblock %}
            </span>
            <span class="window-controls">
                <button type="button" class="window-control bevel-out" data-aesthetic-only aria-label="Minimize (decorative)">_</button>
                <button type="button" class="window-control bevel-out" data-aesthetic-only aria-label="Maximize (decorative)">□</button>
                <button type="button" class="window-control bevel-out" data-aesthetic-only aria-label="Close (decorative)">×</button>
            </span>
        </div>

        <main class="window-body">
            {% block content %}{% endblock %}

            {% block subscribe %}
            <aside class="subscribe bevel-in">
                <div id="mlb2-39982439" class="ml-subscribe-form ml-subscribe-form-39982439">
                    <div class="subscribe-inner row-form">
                        <h2 class="subscribe-title">Hearing Hearings via Email.</h2>
                        <form class="ml-block-form subscribe-form"
                              action="https://assets.mailerlite.com/jsonp/2271536/forms/184864037765383434/subscribe"
                              method="post" target="_blank">
                            <label class="sr-only" for="subscribe-email">Email address</label>
                            <input id="subscribe-email" class="subscribe-input bevel-in" type="email"
                                   name="fields[email]" placeholder="you@example.com"
                                   aria-required="true" required autocomplete="email">
                            <button type="submit" class="subscribe-button bevel-out">Subscribe</button>
                            <input type="hidden" name="ml-submit" value="1">
                            <input type="hidden" name="anticsrf" value="true">
                        </form>
                    </div>
                    <div class="subscribe-inner row-success" style="display: none">
                        <h2 class="subscribe-title">Thank you.</h2>
                        <p class="subscribe-copy">You have joined the subscriber list.</p>
                    </div>
                </div>
            </aside>
            {% endblock %}
        </main>

        <div class="window-statusbar" aria-hidden="true">
            {% block statusbar %}
            <span class="status-cell status-cell--sm"></span>
            <span class="status-cell"></span>
            <span class="status-cell status-cell--sm"></span>
            {% endblock %}
        </div>
    </div>
    <div id="aesthetic-tooltip" class="aesthetic-tooltip" role="status" aria-live="polite" hidden>For Aesthetic Purposes Only.</div>
    <script>
        (function () {
            var tip = document.getElementById('aesthetic-tooltip');
            var timer;
            document.querySelectorAll('[data-aesthetic-only]').forEach(function (btn) {
                btn.addEventListener('click', function (ev) {
                    tip.hidden = false;
                    var tipW = tip.offsetWidth;
                    tip.style.left = (ev.clientX - tipW - 12) + 'px';
                    tip.style.top = (ev.clientY + 12) + 'px';
                    clearTimeout(timer);
                    timer = setTimeout(function () { tip.hidden = true; }, 1800);
                });
            });
            document.addEventListener('click', function (ev) {
                if (!ev.target.closest('[data-aesthetic-only]') && !tip.hidden) {
                    tip.hidden = true;
                }
            });
        })();
    </script>
    <script>
        function ml_webform_success_39982439() {
            document.querySelectorAll('.ml-subscribe-form-39982439 .row-success').forEach(function (el) { el.style.display = ''; });
            document.querySelectorAll('.ml-subscribe-form-39982439 .row-form').forEach(function (el) { el.style.display = 'none'; });
        }
    </script>
    <script src="https://groot.mailerlite.com/js/w/webforms.min.js?v95037e5bac78f29ed026832ca21a7c7b" type="text/javascript"></script>
    <script>fetch("https://assets.mailerlite.com/jsonp/2271536/forms/184864037765383434/takel");</script>
</body>
</html>
